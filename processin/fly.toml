# fly.toml app configuration file generated for idph-equity on 2026-05-04T23:08:00-05:00

app = 'idph-equity'
primary_region = 'ord'

[build]
  dockerfile = 'Dockerfile'

[mounts]
  source = 'app_data'
  destination = '/app/static'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
